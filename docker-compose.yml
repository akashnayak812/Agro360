version: '3.8'

services:
  # ---- MySQL Database ----
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-agro360_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agro360}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-agro360_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Flask Backend ----
  backend:
    build: ./backend
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      - MYSQL_HOST=db
      - FLASK_ENV=production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---- React Frontend (Nginx) ----
  frontend:
    build:
      context: ./frontend
      args:
        # When using nginx proxy, frontend calls /api/* which nginx forwards to backend
        # So VITE_API_URL should be empty (relative) in Docker mode
        VITE_API_URL: ""
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local

networks:
  default:
    driver: bridge
